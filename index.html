<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>WC 2026</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/src/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-title">World Cup 2026</div>
      <div class="last-update" id="last-update">Cập nhật...</div>
    </header>

    <main class="main-content" id="main-content">
      <!-- Nội dung các trang sẽ được render vào đây -->
      <div id="loading" class="text-center mt-4 text-muted">
        <div class="skeleton skeleton-text mb-2"></div>
        <div class="skeleton skeleton-text mb-2"></div>
        <div class="skeleton skeleton-text"></div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="#" class="nav-item active" data-tab="today">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
        Hôm nay
      </a>
      <a href="#" class="nav-item" data-tab="schedule">
        <svg viewBox="0 0 24 24"><path d="M14 17H4v2h10v-2zm6-8H4v2h16V9zM4 15h16v-2H4v2zM4 5v2h16V5H4z"/></svg>
        Lịch thi đấu
      </a>
      <a href="#" class="nav-item" data-tab="results">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Kết quả
      </a>
      <a href="#" class="nav-item" data-tab="standings">
        <svg viewBox="0 0 24 24"><path d="M3 3h18v2H3V3zm0 16h18v2H3v-2zm0-8h18v2H3v-2z"/></svg>
        Bảng đấu
      </a>
      <a href="#" class="nav-item" data-tab="knockout">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7v-7zm4-3h2v10h-2V7zm4 6h2v4h-2v-4z"/></svg>
        Knock-out
      </a>
    </nav>

    <!-- Bottom Sheet cho chi tiết trận đấu -->
    <div class="bottom-sheet-overlay" id="sheet-overlay"></div>
    <div class="bottom-sheet" id="match-details-sheet">
      <div class="sheet-handle"></div>
      <div id="match-details-content">
        <!-- Render chi tiết vào đây -->
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW registered!', reg);
        }).catch(err => console.log('SW register failed', err));
      });
    }
  </script>
</body>
</html>
