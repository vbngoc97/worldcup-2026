<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WC 2026">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="description" content="Lịch thi đấu và kết quả FIFA World Cup 2026 theo giờ Việt Nam">
  <title>World Cup 2026 – Lịch & Kết Quả</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header class="header" id="app-header">
      <div class="header-inner">
        <div class="header-logo">
          <div class="logo-icon">⚽</div>
          <div>
            <div class="logo-title">World Cup 2026</div>
            <div class="logo-subtitle">FIFA · USA · CAN · MEX</div>
          </div>
        </div>
        <div class="header-right">
          <div class="update-time" id="update-time"></div>
          <button class="refresh-btn" id="refresh-btn" aria-label="Cập nhật">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M1 4v6h6M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Pages rendered here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-tab="today">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
        </svg>
        <span>Hôm nay</span>
      </button>
      <button class="nav-item" data-tab="schedule">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
        </svg>
        <span>Lịch đấu</span>
      </button>
      <button class="nav-item" data-tab="results">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        <span>Kết quả</span>
      </button>
      <button class="nav-item" data-tab="standings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 17H2v-5h5v5zm0-7H2V7h5v3zm6 9H8V4h5v15zm6 0h-5v-9h5v9z"/>
        </svg>
        <span>Bảng đấu</span>
      </button>
      <button class="nav-item" data-tab="knockout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/>
        </svg>
        <span>Knock-out</span>
      </button>
    </nav>

  </div>

  <!-- Match Detail Bottom Sheet -->
  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle-bar"></div>
    <div class="sheet-content" id="sheet-content"></div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script type="module" src="./src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registered'))
          .catch(e => console.warn('SW failed:', e));
      });
    }
  </script>
</body>
</html>
